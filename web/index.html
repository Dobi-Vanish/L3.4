<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Processor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .thumbnail { width: 100px; height: 100px; object-fit: cover; }
    .status-badge { font-size: 0.9em; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h1>Image Processing Service</h1>
  <div class="row">
    <div class="col-md-6">
      <form id="uploadForm" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="imageFile" class="form-label">Choose image</label>
          <input class="form-control" type="file" id="imageFile" name="image" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
      </form>
      <div id="uploadStatus" class="mt-2"></div>
    </div>
  </div>
  <hr>
  <h2>Images</h2>
  <table class="table table-striped" id="imagesTable">
    <thead>
    <tr>
      <th>Thumbnail</th>
      <th>ID</th>
      <th>Filename</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody id="imagesList">
    <!-- populated by JS -->
    </tbody>
  </table>
</div>
<script>
  const API_BASE = '/api';

  async function loadImages() {
    const res = await fetch(`${API_BASE}/images`);
    const images = await res.json();
    const tbody = document.getElementById('imagesList');
    tbody.innerHTML = '';
    images.forEach(img => {
      const row = document.createElement('tr');
      let thumbnailUrl = '';
      if (img.status === 'done') {
        thumbnailUrl = `${API_BASE}/image/${img.id}?variant=thumbnail`;
      } else {
        thumbnailUrl = 'https://via.placeholder.com/100?text=Processing';
      }
      row.innerHTML = `
    <td><img src="${thumbnailUrl}" class="thumbnail" alt="thumbnail" onerror="this.src='https://via.placeholder.com/100?text=Error'"></td>
    <td>${img.id}</td>
    <td>${img.original_filename}</td>
    <td><span class="badge ${img.status === 'done' ? 'bg-success' : img.status === 'failed' ? 'bg-danger' : 'bg-warning'} status-badge">${img.status}</span></td>
    <td>
        <button class="btn btn-sm btn-danger" onclick="deleteImage('${img.id}')">Delete</button>
        ${img.status === 'done' ?
              `<div class="btn-group" role="group">
                <a href="${API_BASE}/image/${img.id}?variant=original" class="btn btn-sm btn-outline-primary" target="_blank" title="Original">Orig</a>
                <a href="${API_BASE}/image/${img.id}?variant=resized" class="btn btn-sm btn-outline-success" target="_blank" title="Resized">Resize</a>
                <a href="${API_BASE}/image/${img.id}?variant=thumbnail" class="btn btn-sm btn-outline-info" target="_blank" title="Thumbnail">Thumb</a>
                <a href="${API_BASE}/image/${img.id}?variant=watermarked" class="btn btn-sm btn-outline-warning" target="_blank" title="Watermarked">Water</a>
            </div>`
              : '<span class="text-muted">Processing</span>'}
    </td>
`;
      tbody.appendChild(row);
    });
  }

  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const statusDiv = document.getElementById('uploadStatus');
    statusDiv.innerHTML = '<div class="alert alert-info">Uploading...</div>';
    try {
      const res = await fetch(`${API_BASE}/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (res.ok) {
        statusDiv.innerHTML = `<div class="alert alert-success">Uploaded: ${data.id}</div>`;
        loadImages();
      } else {
        statusDiv.innerHTML = `<div class="alert alert-danger">Error: ${data.error}</div>`;
      }
    } catch (err) {
      statusDiv.innerHTML = `<div class="alert alert-danger">Network error</div>`;
    }
  });

  async function deleteImage(id) {
    if (!confirm('Delete image?')) return;
    const res = await fetch(`${API_BASE}/image/${id}`, { method: 'DELETE' });
    if (res.ok) {
      loadImages();
    } else {
      alert('Delete failed');
    }
  }

  setInterval(loadImages, 50000);
  loadImages();
</script>
</body>
</html>
